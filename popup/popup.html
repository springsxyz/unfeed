<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UnFeed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand-row">
        <div class="brand">UnFeed</div>
        <div class="plan" id="plan"></div>
      </div>
      <p class="tagline">Remove the feed. Keep the app.</p>
    </header>

    <section class="signal-block" aria-label="Sites">
      <main class="main" id="site-list">
        <!-- rows injected by popup.js -->
      </main>
    </section>

    <section class="upgrade" id="upgrade" hidden>
      <p class="upgrade-title">
        <svg class="section-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-7-2a2 2 0 0 1 4 0v2h-4V6zm7 14H7V10h10v10z"
          />
        </svg>
        Unlock all sites
      </p>
      <p class="upgrade-copy">
        Enter your license key to unlock every site.
      </p>
      <div class="license-row">
        <input
          id="license-input"
          type="text"
          placeholder="Enter license key"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="button" id="license-btn">Unlock</button>
      </div>
      <p class="license-msg" id="license-msg"></p>
    </section>

    <div class="end-space" aria-hidden="true"></div>

    <footer class="popup-links">
      <a href="#" id="privacy-link">Privacy</a>
    </footer>

    <script src="../shared/config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
